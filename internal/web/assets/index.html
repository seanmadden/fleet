<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a1b26">
  <meta name="color-scheme" content="dark">
  <title>fleet</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <button id="back-btn" class="iconbtn" hidden aria-label="Back">&larr;</button>
    <h1 id="title">fleet</h1>
    <button id="refresh-btn" class="iconbtn" aria-label="Refresh">&#8635;</button>
  </header>

  <main id="app">
    <section id="list-view">
      <ul id="session-list" class="session-list" aria-live="polite"></ul>
      <button id="new-btn" class="fab" aria-label="New session">+</button>
    </section>

    <section id="detail-view" hidden>
      <div class="detail-meta">
        <div class="detail-title" id="detail-title"></div>
        <div class="detail-sub" id="detail-sub"></div>
      </div>
      <pre id="pane" class="pane" aria-live="polite"></pre>
      <div class="actions">
        <button id="approve-btn" class="btn primary">Approve (y &amp; Enter)</button>
        <form id="sendkeys-form" class="sendkeys">
          <input id="sendkeys-input" type="text" inputmode="text" autocomplete="off"
                 spellcheck="false" placeholder="keys (e.g. Enter, hello, C-c)">
          <button type="submit" class="btn">Send</button>
        </form>
        <div class="row">
          <button id="restart-btn" class="btn">Restart</button>
          <button id="delete-btn" class="btn danger">Delete</button>
        </div>
      </div>
    </section>

    <dialog id="new-dialog">
      <form method="dialog">
        <h2>New session</h2>
        <label>Path<input id="new-path" type="text" required></label>
        <label>Title<input id="new-title" type="text"></label>
        <label>Workspace name (optional)<input id="new-workspace" type="text"></label>
        <menu>
          <button value="cancel" class="btn">Cancel</button>
          <button id="new-confirm" value="create" class="btn primary">Create</button>
        </menu>
      </form>
    </dialog>
  </main>

  <div id="toast" class="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
