version: v2
modules:
  - path: proto
lint:
  use:
    - STANDARD
  # Deliberate style choices — see proto/README.md and docs/desktop/architecture.md.
  except:
    # Service named "Fleet" not "FleetService" — short, brand-aligned, matches the
    # binary name. The "Service" suffix is buf-style; we don't follow it.
    - SERVICE_SUFFIX
    # We reuse types across RPCs (Session for Get/Create/Restart/Rename,
    # google.protobuf.Empty for void operations, Config for Get/Update). The
    # alternative — wrapper types per RPC — adds boilerplate without value.
    - RPC_REQUEST_RESPONSE_UNIQUE
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
breaking:
  use:
    - FILE
